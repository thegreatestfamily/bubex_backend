services:
  - type: web
    name: bubex-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn bubex_core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: bubex_core.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bubex-db
          property: connectionString
      - key: DEBUG
        value: "False"

databases:
  - name: bubex-db
    plan: free
